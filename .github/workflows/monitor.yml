name: Termin-Monitor

# Läuft in der GitHub-Cloud — unabhängig von Jaspers Mac, 24/7.
on:
  schedule:
    - cron: "*/10 * * * *"      # alle 10 Minuten (UTC; GitHub kann unter Last leicht verzögern)
  workflow_dispatch:             # manueller Start-Knopf (zum Testen)
    inputs:
      mode:
        description: "once (ein Check) oder test-notify (Test-Push)"
        default: "once"
        type: choice
        options: ["once", "test-notify"]

concurrency:
  group: termin-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Abhängigkeiten + Chromium
        run: |
          python -m pip install --quiet -r requirements.txt
          python -m playwright install --with-deps chromium

      # Dedup-State (alerted_dates etc.) über Läufe hinweg erhalten.
      - name: State laden
        uses: actions/cache/restore@v4
        with:
          path: state
          key: fs-state-${{ github.run_id }}
          restore-keys: fs-state-

      - name: Prüf-Lauf
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          NTFY_SERVER: "https://ntfy.sh"
          # Bürgerbüro Oldenburg, Anliegen Kfz-Anmeldung/Umschreibung (240):
          FUNKTIONSEINHEIT: "1"
          ANLIEGEN_CATEGORY: "KFZ-Angelegenheiten"
          SERVICE_ID: "240"
          # Persönliche Werte (Zielfenster) liegen als verschlüsselte Secrets:
          TARGET_START: ${{ secrets.TARGET_START }}
          TARGET_END: ${{ secrets.TARGET_END }}
          BOOKING_URL: "https://terminvereinbarung.oldenburg.de/select2?md=1"
          POLL_INTERVAL_MINUTES: "10"
          STATE_FILE: "state/state.json"
          LOG_FILE: "logs/monitor.log"
        run: python -m src.monitor --${{ github.event.inputs.mode || 'once' }}

      - name: State sichern
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state
          key: fs-state-${{ github.run_id }}
